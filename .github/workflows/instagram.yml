name: Update Instagram Posts
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with Instagram Posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate Instagram Posts
        # 別の安定したロボットに差し替えました
        uses: bolajiayodeji/instagram-to-readme@v1
        with:
          username: 'utakik'
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Update Instagram posts" || exit 0
          git push
